<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Bài tập buổi 9</title>
</head>

<body>

    <h2>Kết quả</h2>
    <p id="output"></p>

    <script>
        
        let fullName = "Dao Nguyen Chien"; // viết không dấu
        let studentId = "27A4042916";
        let nameParts = fullName.split(" ");
        let firstName = nameParts[nameParts.length - 1];
        let lastName = nameParts[0];
        let middleName = nameParts.slice(1, -1).join("");
        let email = firstName + lastName[0] + middleName[0] + "." + studentId.toLowerCase() + "@hvnh.edu.vn";
        let coursePeriod = studentId.substring(0, 2);
        let faculty = studentId.charAt(2);
        let last4Digits = studentId.slice(-4);
        let sum = 0;
        for (let i = 0; i < last4Digits.length; i++) {
            sum += parseInt(last4Digits[i]);
        }
        document.getElementById("output").innerHTML =
            "Email: " + email + "<br>" +
            "Xin chào " + fullName +
            ", bạn là sinh viên khóa " + coursePeriod +
            ", khoa " + faculty +
            ", tổng 4 số cuối trong mã sinh viên là " + sum;

    </script>

</body>

</html>
